name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for syntax errors
        run: node --check src/commands/init.js src/commands/install.js src/commands/uninstall.js

  templates:
    name: Validate command templates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check all commandNames have template files
        run: |
          node -e "
            import('./src/commands/install.js').then(m => {
              console.log('install.js loads OK');
            }).catch(e => {
              console.error('install.js load error:', e.message);
              process.exit(1);
            });
          "

      - name: Verify all template markdown files are valid
        run: |
          for f in templates/commands/*.md; do
            if ! grep -q '^---' "$f"; then
              echo "MISSING frontmatter: $f"
              exit 1
            fi
            if ! grep -q '^name:' "$f"; then
              echo "MISSING name field: $f"
              exit 1
            fi
          done
          echo "All templates have frontmatter"

  security:
    name: Security audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (moderate+)
        run: npm audit --audit-level=moderate
